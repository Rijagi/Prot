<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mercedes — 1995 C‑Class</title>
  <link rel="stylesheet" href="lightbox.css">
</head>
<body>
  <main class="container">
    <header style="text-align:center;margin:36px 0">
      <h1>Mercedes — Gallery</h1>
      <p>Click the car below to view the full photo without leaving the site.</p>
    </header>

    <section class="grid" aria-label="Mercedes models">
      <article class="card" tabindex="0" data-src="images/mercedes-1995-c-class.png" data-alt="1995 Mercedes-Benz C-Class W202 side view">
        <img src="images/mercedes-1995-c-class-400.png" alt="1995 Mercedes-Benz C-Class — thumbnail" loading="lazy" width="400" height="267">
        <h3>1995 Mercedes‑Benz C‑Class (W202)</h3>
      </article>
    </section>
  </main>

  <!-- Modal (hidden by default) -->
  <div class="modal" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-content" role="document">
      <button class="close-btn" id="lbClose" aria-label="Close (Esc)">✕</button>
      <img id="lbImage" src="" alt="">
      <div class="caption">
        <div id="lbTitle">1995 Mercedes‑Benz C‑Class (W202)</div>
        <a id="lbDownload" href="#" download>Download</a>
      </div>
    </div>
  </div>

  <script src="lightbox.js"></script>
</body>
</html>
